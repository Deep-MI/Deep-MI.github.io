- name: Martin Reuter
  image: /static/img/members/reuter.jpg
  #altimage: /static/img/members/reuter.jpg
  position: Principal Investigator
  email: martin.reuter (at) dzne.de
  scholar: CbdJk1wAAAAJ
  twitter: deepmilab
  orcid: 0000-0002-2665-9693
  github: deepmi
  description: 'Martin is the founder and director of the Deep-MI Lab, the [AI in Medical
  Imaging Lab at the German Center for Neurodegenerative Diseases (DZNE)](https://www.dzne.de/en/research/research-areas/population-health-sciences/forschungsgruppen/reuter/) in Bonn, where he
  leads a team building AI methods to understand the aging and diseased brain from MRI,
  including [FastSurfer](https://fastsurfer.net), the lab''s award-winning open-source brain segmentation tool.
  He is also Professor of AI in Medical Imaging at the University of Bonn, and holds a joint
  appointment as Assistant Professor of Radiology and Neurology at [Harvard Medical School](https://researchers.mgh.harvard.edu/profile/3589484/Martin-Reuter) and
  Massachusetts General Hospital. He is further affiliated with the [Martinos Center for
  Biomedical Imaging](https://www.martinos.org/faculty/reuter-martin/) and the 
  [MIT Computer Science and Artificial Intelligence Lab (CSAIL)](https://reuter.mit.edu).


  Martin studied mathematics and computer science at Leibniz University Hannover and earned
  his PhD in computational and differential geometry, where he developed ShapeDNA, an
  award-winning spectral approach to shape analysis. A Feodor Lynen Fellowship from the
  Alexander von Humboldt Foundation then brought him to MIT, where he continued to develop
  influential methods for non-rigid shape analysis and increasingly turned them toward
  medical applications. This path led him to MGH/Harvard Medical School in 2008, where he
  shifted his focus fully to medical image analysis, contributing methods for unbiased
  longitudinal processing of brain MRI and structural shape analysis for computer-aided
  diagnosis and prognosis, now widely used as part of the open-source
  [FreeSurfer](https://freesurfer.net) package to
  study neurodegeneration and assess disease-modifying therapies, e.g. by the
  [Alzheimer''s Disease Neuroimaging Initiative](https://adni.loni.usc.edu/) and the
  [Rhineland Study](https://www.rheinland-studie.de/en/research/research-areas/).


  Following an NIH Career Award for his work on computational methods in medical imaging,
  Martin was appointed Assistant Professor of Radiology and of Neurology at Harvard Medical
  School in 2015, positions he still holds today. In 2016 he founded the Deep-MI Lab in Bonn,
  and in 2024 he obtained a professorship at the University of Bonn, continuing to build a
  team bridging computational geometry, deep learning, and clinical neuroscience.'

